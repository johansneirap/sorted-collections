name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint, typecheck, test, build
        run: |
          npm run lint
          npm run typecheck
          npm run test:coverage
          npm run build

      # Intentionally no `publish:` input here. With zero pending changesets,
      # changesets/action's publish step runs unconditionally and will try to
      # publish whatever version is currently in package.json — which bit us
      # on the very first run (attempted to publish 0.1.0 with no changesets
      # and no explicit go-ahead; only npm's 2FA/token policy stopped it).
      # This step only ever opens/updates a "Version Packages" PR. The actual
      # `npm publish` is a deliberate, manual step — see CONTRIBUTING.md.
      - name: Create Release PR
        uses: changesets/action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
