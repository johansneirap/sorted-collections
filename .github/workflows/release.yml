name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Lint, typecheck, test, build
        run: |
          npm run lint
          npm run typecheck
          npm run test:coverage
          npm run build

      # changesets/action publishes whenever there are zero pending changesets
      # — which is both "a Version Packages PR was just merged" (intended) and
      # "no changeset has ever been added" (not intended: bit us once, trying
      # to publish 0.1.0 unprompted; only npm's 2FA policy stopped it). Safe
      # here because this repo never reaches a "zero changesets, unpublished
      # version" state by accident: every PR that should ship adds a
      # changeset (see CONTRIBUTING.md), so the only way to zero them out is
      # merging the Version Packages PR this action itself opens — a
      # deliberate, visible action.
      - name: Create Release PR or publish to npm
        uses: changesets/action@v1
        with:
          publish: npx changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
